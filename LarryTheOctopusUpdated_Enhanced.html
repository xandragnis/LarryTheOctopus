  const [muted, setMuted] = useState(false);
  
  const gameRef = useRef({
    larryX: GAME_WIDTH / 2 - LARRY_WIDTH / 2,
    larryVX: 0,
    prevLarryX: GAME_WIDTH / 2 - LARRY_WIDTH / 2,
    donuts: [],
    keys: { left: false, right: false },
    lastSpawn: 0,
    spawnInterval: 2000,
    animationId: null,
    score: 0,
    lives: 3,
    particles: [],
    creatures: [],
    lastCreatureSpawn: 0,
    creatureSpawnInterval: 4000,
    backgroundElements: null,
    caughtDonuts: [],
    nextTentacle: 0,
    sandParticles: [],
    reachingTentacle: 0,
    lastSpawnX: GAME_WIDTH / 2,
  });

  const resetGame = useCallback(() => {
    const game = gameRef.current;
    game.larryX = GAME_WIDTH / 2 - LARRY_WIDTH / 2;
    game.larryVX = 0;
    game.prevLarryX = game.larryX;
    game.donuts = [];
    game.particles = [];
    game.creatures = [];
    game.caughtDonuts = [];
    game.nextTentacle = 0;
    game.sandParticles = [];
    game.lastSpawn = Date.now();
    game.lastCreatureSpawn = Date.now();
    game.spawnInterval = 2000;
    game.score = 0;
    game.lives = 3;
    game.lastSpawnX = GAME_WIDTH / 2;
    if (!game.backgroundElements) {
      game.backgroundElements = createBackgroundElements();
    }
    setScore(0);
    setLives(3);
  }, []);

  const spawnDonut = useCallback(() => {
    const game = gameRef.current;
    const now = Date.now();
    const adjustedInterval = Math.max(800, game.spawnInterval - game.score * 15);
    
    if (now - game.lastSpawn > adjustedInterval) {
      const minX = DONUT_SIZE / 2;
      const maxX = GAME_WIDTH - DONUT_SIZE * 1.5;
      const spawnRange = maxX - minX;
      
      let newX;
      const avoidRadius = 80;
      const lastX = game.lastSpawnX;
      
      for (let attempt = 0; attempt < 5; attempt++) {
        newX = minX + Math.random() * spawnRange;
        
        if (Math.random() < 0.4) {
          if (lastX < GAME_WIDTH / 2) {
            newX = GAME_WIDTH / 2 + Math.random() * (spawnRange / 2);
          } else {
            newX = minX + Math.random() * (spawnRange / 2);
          }
        }
        
        newX += (Math.random() - 0.5) * 40;
        newX = Math.max(minX, Math.min(maxX, newX));
        
        if (Math.abs(newX - lastX) > avoidRadius) {
          break;
        }
      }
      
      game.donuts.push({
        x: newX,
        y: -DONUT_SIZE,
        speed: BASE_FALL_SPEED + Math.random() * 1.5 + game.score * 0.08,
        rotation: Math.random() * Math.PI * 2,
        rotationSpeed: (Math.random() - 0.5) * 0.08
      });
      
      game.lastSpawnX = newX;
      game.lastSpawn = now;
    }
  }, []);

  const spawnCreature = useCallback(() => {
    const game = gameRef.current;
    const now = Date.now();
    
    if (now - game.lastCreatureSpawn > game.creatureSpawnInterval) {
      const weights = [
        { type: 'fish', weight: 30 },
        { type: 'jellyfish', weight: 20 },
        { type: 'crab', weight: 20 },
        { type: 'turtle', weight: 15 },
        { type: 'clam', weight: 12 },
        { type: 'seahorse', weight: 10 },
        { type: 'pufferfish', weight: 8 },
        { type: 'shrimp', weight: 3 },
      ];
      
      const totalWeight = weights.reduce((sum, w) => sum + w.weight, 0);
      let random = Math.random() * totalWeight;
      let type = 'fish';
      
      for (const w of weights) {
        random -= w.weight;
        if (random <= 0) {
          type = w.type;
          break;
        }
      }
      
      const sameTypeCount = game.creatures.filter(c => c.type === type).length;
      const maxOfType = type === 'fish' ? 2 : (type === 'shrimp' || type === 'seahorse' || type === 'pufferfish') ? 1 : 2;
      
      if (sameTypeCount < maxOfType) {
        const creature = createCreature(type);
        if (creature) {
          game.creatures.push(creature);
        }
      }
      
      game.lastCreatureSpawn = now;
      game.creatureSpawnInterval = 3500 + Math.random() * 4000;
    }
  }, []);

  const gameLoop = useCallback(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    
    const ctx = canvas.getContext('2d');
    const game = gameRef.current;
    const time = Date.now();

    if (!game.backgroundElements) {
      game.backgroundElements = createBackgroundElements();
    }

    const gradient = ctx.createLinearGradient(0, 0, 0, GAME_HEIGHT);
    gradient.addColorStop(0, '#4a8caf');
    gradient.addColorStop(0.2, '#3d7a9b');
    gradient.addColorStop(0.5, '#2a5a7b');
    gradient.addColorStop(0.8, '#1a3a55');
    gradient.addColorStop(1, '#0d1f33');
    ctx.fillStyle = gradient;
    ctx.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT);

    ctx.globalAlpha = 0.08;
    for (let i = 0; i < 25; i++) {
      const cx = (Math.sin(time * 0.0008 + i * 0.5) * 0.5 + 0.5) * GAME_WIDTH;
      const cy = (i / 25) * GAME_HEIGHT * 0.5;
      ctx.fillStyle = '#87ceeb';
      ctx.beginPath();
      ctx.ellipse(cx, cy, 25 + Math.sin(time * 0.002 + i) * 12, 4, Math.sin(time * 0.001) * 0.2, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;

    drawBackgroundElements(ctx, game.backgroundElements, time);

    ctx.fillStyle = '#1a5c3a';
    for (let i = 0; i < 6; i++) {
      const swx = 40 + i * 85;
      const sway = Math.sin(time * 0.0015 + i * 0.7) * 12;
      const height = 80 + (i % 3) * 30;
      ctx.beginPath();
      ctx.moveTo(swx, GAME_HEIGHT - 25);
      ctx.quadraticCurveTo(swx + sway, GAME_HEIGHT - 25 - height * 0.6, swx + sway * 0.7, GAME_HEIGHT - 25 - height);
      ctx.quadraticCurveTo(swx + sway * 0.5, GAME_HEIGHT - 25 - height * 0.6, swx + 8, GAME_HEIGHT - 25);
      ctx.fill();
    }

    const prevX = game.larryX;
    if (game.keys.left && game.larryX > 0) {
      game.larryX = Math.max(0, game.larryX - LARRY_SPEED);
    }
    if (game.keys.right && game.larryX < GAME_WIDTH - LARRY_WIDTH) {
      game.larryX = Math.min(GAME_WIDTH - LARRY_WIDTH, game.larryX + LARRY_SPEED);
    }
    
    const newVelocity = game.larryX - prevX;
    game.larryVX = game.larryVX * 0.7 + newVelocity * 0.3;
    
    if (Math.abs(game.larryVX) > 1 && Math.random() < 0.4) {
      game.sandParticles.push({
        x: game.larryX + LARRY_WIDTH / 2 + (Math.random() - 0.5) * 30,
        y: GAME_HEIGHT - 35,
        vx: -game.larryVX * 0.3 + (Math.random() - 0.5) * 2,
        vy: -1 - Math.random() * 2,
        size: 2 + Math.random() * 3,
        life: 1,
        color: '#a08060',
      });
    }

    spawnDonut();
    spawnCreature();

    game.creatures = game.creatures.filter(creature => {
      const alive = updateCreature(creature, time);
      if (alive) drawCreature(ctx, creature, time);
      return alive;
    });

    game.donuts = game.donuts.filter(donut => {
      donut.y += donut.speed;
      donut.rotation += donut.rotationSpeed;

      const larryCenter = { x: game.larryX + LARRY_WIDTH / 2, y: GAME_HEIGHT - 120 };
      const donutCenter = { x: donut.x + DONUT_SIZE / 2, y: donut.y + DONUT_SIZE / 2 };
      const dist = Math.hypot(larryCenter.x - donutCenter.x, larryCenter.y - donutCenter.y);

      if (dist < (LARRY_WIDTH / 2 + DONUT_SIZE / 2) * 0.86) {
        game.score++;
        setScore(game.score);
        playCatchSound();
        
        // Create happy particles! Hearts, stars, and sparkles
        const px = donut.x + DONUT_SIZE / 2;
        const py = donut.y + DONUT_SIZE / 2;
        
        // Hearts
        for (let i = 0; i < 4; i++) {
          game.particles.push({
            type: 'heart',
            x: px + (Math.random() - 0.5) * 30,
            y: py + (Math.random() - 0.5) * 20,
            vx: (Math.random() - 0.5) * 3,
            vy: -2 - Math.random() * 2,
            life: 1,
            size: 8 + Math.random() * 6,
            color: ['#ff6b9d', '#ff8fab', '#ffb3c6'][Math.floor(Math.random() * 3)],
            rotation: (Math.random() - 0.5) * 0.5,
          });
        }
        
        // Stars
        for (let i = 0; i < 5; i++) {
          game.particles.push({
            type: 'star',
            x: px + (Math.random() - 0.5) * 40,
            y: py + (Math.random() - 0.5) * 30,
            vx: (Math.random() - 0.5) * 4,
            vy: -1.5 - Math.random() * 2.5,
            life: 1,
            size: 6 + Math.random() * 5,
            color: ['#ffd700', '#ffec8b', '#fff8dc', '#ffe66d'][Math.floor(Math.random() * 4)],
            rotation: Math.random() * Math.PI * 2,
            rotSpeed: (Math.random() - 0.5) * 0.3,
          });
        }
        
        // Sparkle dots
        for (let i = 0; i < 8; i++) {
          game.particles.push({
            type: 'sparkle',
            x: px + (Math.random() - 0.5) * 50,
            y: py + (Math.random() - 0.5) * 40,
            vx: (Math.random() - 0.5) * 2,
            vy: -1 - Math.random() * 1.5,
            life: 1,
            size: 3 + Math.random() * 3,
            color: ['#fff', '#ffe4ec', '#e0f7ff', '#fff5ba'][Math.floor(Math.random() * 4)],
          });
        }
        
        const tentacle = game.reachingTentacle !== undefined ? game.reachingTentacle : 0;
        
        const onThisTentacle = game.caughtDonuts.filter(d => d.tentacle === tentacle && d.settled).length;
        
        game.caughtDonuts.push({
          tentacle: tentacle,
          slot: onThisTentacle,
          startX: donut.x + DONUT_SIZE / 2,
          startY: donut.y + DONUT_SIZE / 2,
          progress: 0,
          settled: false,
          rotation: donut.rotation,
          size: DONUT_SIZE * 0.6,
          age: 0,
        });
        
        return false;
      }

      if (donut.y > GAME_HEIGHT) {
        game.lives--;
        setLives(game.lives);
        playMissSound();
        if (game.lives <= 0) {
          if (game.animationId) {
            cancelAnimationFrame(game.animationId);
            game.animationId = null;
          }
          setHighScore(prev => Math.max(prev, game.score));
          stopMusic();
          playGameOverSound();
          setGameState('gameover');
        }
        return false;
      }

      drawDonut(ctx, donut.x, donut.y, DONUT_SIZE, donut.rotation);
      return true;
    });

    game.particles = game.particles.filter(p => {
      p.x += p.vx;
      p.y += p.vy;
      
      // Different physics for different particle types
      if (p.type === 'heart') {
        p.vy += 0.02; // Gentle float up then down
        p.vx *= 0.98;
      } else if (p.type === 'star') {
        p.vy += 0.05;
        p.rotation = (p.rotation || 0) + (p.rotSpeed || 0.1);
      } else if (p.type === 'sparkle') {
        p.vy += 0.01; // Very gentle
        p.vx *= 0.99;
      } else {
        p.vy += 0.2; // Default physics
      }
      
      p.life -= 0.015;
      if (p.life <= 0) return false;
      
      ctx.globalAlpha = p.life;
      ctx.fillStyle = p.color;
      
      if (p.type === 'heart') {
        // Draw a heart shape
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rotation || 0);
        ctx.scale(p.life, p.life);
        ctx.beginPath();
        const hs = p.size;
        ctx.moveTo(0, hs * 0.3);
        ctx.bezierCurveTo(-hs * 0.5, -hs * 0.3, -hs, hs * 0.1, 0, hs);
        ctx.bezierCurveTo(hs, hs * 0.1, hs * 0.5, -hs * 0.3, 0, hs * 0.3);
        ctx.fill();
        ctx.restore();
      } else if (p.type === 'star') {
        // Draw a 5-pointed star
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rotation || 0);
        ctx.scale(p.life, p.life);
        ctx.beginPath();
        const spikes = 5;
        const outerR = p.size;
        const innerR = p.size * 0.4;
        for (let i = 0; i < spikes * 2; i++) {
          const r = i % 2 === 0 ? outerR : innerR;
          const angle = (i * Math.PI / spikes) - Math.PI / 2;
          if (i === 0) ctx.moveTo(Math.cos(angle) * r, Math.sin(angle) * r);
          else ctx.lineTo(Math.cos(angle) * r, Math.sin(angle) * r);
        }
        ctx.closePath();
        ctx.fill();
        ctx.restore();
      } else if (p.type === 'sparkle') {
        // Simple glowing dot
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
        ctx.fill();
        // Add glow
        ctx.globalAlpha = p.life * 0.3;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size * p.life * 2, 0, Math.PI * 2);
        ctx.fill();
      } else {
        // Default circle particle
        ctx.beginPath();
        ctx.arc(p.x, p.y, 4, 0, Math.PI * 2);
        ctx.fill();
      }
      
      ctx.globalAlpha = 1;
      return true;
    });

    ctx.fillStyle = '#8b7355';
    ctx.fillRect(0, GAME_HEIGHT - 30, GAME_WIDTH, 30);
    
    ctx.fillStyle = '#a08060';
    for (let i = 0; i < GAME_WIDTH; i += 5) {
      const h = 2 + Math.sin(i * 0.15 + time * 0.001) * 1.5;
      ctx.fillRect(i, GAME_HEIGHT - 30 + Math.sin(i * 0.1) * 2, 3, h);
    }
    
    ctx.fillStyle = '#6b5344';
    ctx.beginPath();
    ctx.ellipse(80, GAME_HEIGHT - 20, 12, 6, 0.2, 0, Math.PI * 2);
    ctx.ellipse(250, GAME_HEIGHT - 18, 8, 5, -0.1, 0, Math.PI * 2);
    ctx.ellipse(420, GAME_HEIGHT - 22, 15, 7, 0.3, 0, Math.PI * 2);
    ctx.fill();

    game.sandParticles = game.sandParticles.filter(p => {
      p.x += p.vx;
      p.y += p.vy;
      p.vy += 0.15;
      p.life -= 0.025;
      
      if (p.life <= 0) return false;
      
      ctx.globalAlpha = p.life * 0.6;
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
      
      return true;
    });

    let reachTarget = null;
    let reachingTentacle = 0;
    const larryCenterX = game.larryX + LARRY_WIDTH / 2;
    
    const collisionY = GAME_HEIGHT - 120;
    
    let bestDonut = null;
    let bestScore = -1;
    
    const REACH_HEIGHT = 150;
    const HORIZONTAL_RANGE = LARRY_WIDTH * 1.5;
    
    game.donuts.forEach(donut => {
      const donutCenterX = donut.x + DONUT_SIZE / 2;
      const donutCenterY = donut.y + DONUT_SIZE / 2;
      
      const aboveCollision = collisionY - donutCenterY;
      
      const horizontalDist = Math.abs(larryCenterX - donutCenterX);
      
      if (aboveCollision > -30 && aboveCollision < REACH_HEIGHT && horizontalDist < HORIZONTAL_RANGE) {
        const verticalProgress = 1 - (Math.max(0, aboveCollision) / REACH_HEIGHT);
        const horizontalPenalty = horizontalDist / HORIZONTAL_RANGE;
        const score = verticalProgress * (1 - horizontalPenalty * 0.3);
        
        if (score > bestScore) {
          bestScore = score;
          bestDonut = { 
            x: donutCenterX, 
            y: donutCenterY, 
            aboveCollision
          };
        }
      }
    });
    
    if (bestDonut) {
      const normalizedAbove = Math.max(0, bestDonut.aboveCollision) / REACH_HEIGHT;
      
      const extension = 0.2 + (1 - normalizedAbove) * 0.8;
      
      const larryDrawX = game.larryX;
      const leftTentacleX = larryDrawX + 22;
      const rightTentacleX = larryDrawX + 68;
      
      const leftDist = Math.abs(bestDonut.x - leftTentacleX);
      const rightDist = Math.abs(bestDonut.x - rightTentacleX);
      
      reachingTentacle = leftDist < rightDist ? 0 : 1;
      
      reachTarget = {
        x: bestDonut.x,
        y: bestDonut.y,
        extension: extension
      };
    }
    
    game.reachingTentacle = reachingTentacle;

    drawLarry(ctx, game.larryX, GAME_HEIGHT - LARRY_HEIGHT - 20, 1, game.larryVX, reachTarget);

    const tentacleTime = time * 0.001;
    
    const leftWave1 = Math.sin(tentacleTime * 2.5) * 28;
    const leftWave2 = Math.sin(tentacleTime * 5.5 + 0.8) * 15;
    const leftWave3 = Math.sin(tentacleTime * 9 + 1.5) * 8;
    const leftTipWiggle = leftWave1 + leftWave2 + leftWave3;
    
    const rightWave1 = Math.sin(tentacleTime * 2.5 + 1.8) * 28;
    const rightWave2 = Math.sin(tentacleTime * 5.5 + 2.5) * 15;
    const rightWave3 = Math.sin(tentacleTime * 9 + 3.2) * 8;
    const rightTipWiggle = rightWave1 + rightWave2 + rightWave3;
    
    const vDrag = Math.max(-1, Math.min(1, game.larryVX / 8)) * 20;
    
    const larryDrawX = game.larryX;
    const larryDrawY = GAME_HEIGHT - LARRY_HEIGHT - 20;
    
    const leftTipX = larryDrawX - 5 + leftTipWiggle + vDrag;
    const leftTipY = larryDrawY - 35;
    const rightTipX = larryDrawX + 95 + rightTipWiggle + vDrag;
    const rightTipY = larryDrawY - 35;
    
    game.caughtDonuts = game.caughtDonuts.filter(caught => {
      if (!caught.settled) {
        caught.progress += 0.08;
        if (caught.progress >= 1) {
          caught.progress = 1;
          caught.settled = true;
        }
      } else {
        caught.age++;
        if (caught.age > 300) return false;
      }
      
      const tipX = caught.tentacle === 0 ? leftTipX : rightTipX;
      const tipY = caught.tentacle === 0 ? leftTipY : rightTipY;
      
      const slotOffset = caught.slot * 18;
      const targetX = tipX + (caught.tentacle === 0 ? slotOffset * 0.3 : -slotOffset * 0.3);
      const targetY = tipY + slotOffset;
      
      const currentX = caught.startX + (targetX - caught.startX) * easeOutBack(caught.progress);
      const currentY = caught.startY + (targetY - caught.startY) * easeOutBack(caught.progress);
      
      const wobbleX = caught.settled ? Math.sin(tentacleTime * 2 + caught.slot) * 2 : 0;
      const wobbleY = caught.settled ? Math.cos(tentacleTime * 2 + caught.slot) * 1 : 0;
      
      const fadeOut = caught.age > 250 ? 1 - (caught.age - 250) / 50 : 1;
      ctx.globalAlpha = fadeOut;
      drawDonut(ctx, currentX - caught.size/2 + wobbleX, currentY - caught.size/2 + wobbleY, caught.size, caught.rotation + tentacleTime * 0.5);
      ctx.globalAlpha = 1;
      
      return true;
    });

    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.beginPath();
    ctx.roundRect(8, 8, 120, 32, 8);
    ctx.fill();
    ctx.beginPath();
    ctx.roundRect(GAME_WIDTH - 95, 8, 87, 32, 8);
    ctx.fill();
    
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 18px monospace';
    ctx.textAlign = 'left';
    ctx.fillText(`Score: ${game.score}`, 18, 30);
    
    ctx.textAlign = 'right';
    ctx.font = '20px sans-serif';
    ctx.fillText('🍩'.repeat(game.lives), GAME_WIDTH - 15, 30);

    if (Math.random() < 0.003) {
      playBubbleSound();
    }

    if (gameState === 'playing') {
      game.animationId = requestAnimationFrame(gameLoop);
    }
  }, [gameState, spawnDonut, spawnCreature]);

  useEffect(() => {
    if (gameState === 'playing') {
      resetGame();
      gameRef.current.animationId = requestAnimationFrame(gameLoop);
    }
    return () => {
      if (gameRef.current.animationId) {
        cancelAnimationFrame(gameRef.current.animationId);
      }
    };
  }, [gameState, gameLoop, resetGame]);

  useEffect(() => {
    const handleKeyDown = (e) => {
      if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') {
        e.preventDefault();
        gameRef.current.keys.left = true;
      }
      if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') {
        e.preventDefault();
        gameRef.current.keys.right = true;
      }
      if ((e.key === ' ' || e.key === 'Enter') && gameState !== 'playing') {
        initAudio().then(() => {
          startMusic();
          playStartSound();
        });
        setGameState('playing');
      }
    };
    const handleKeyUp = (e) => {
      if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') gameRef.current.keys.left = false;
      if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') gameRef.current.keys.right = false;
    };

    window.addEventListener('keydown', handleKeyDown);
    window.addEventListener('keyup', handleKeyUp);
    return () => {
      window.removeEventListener('keydown', handleKeyDown);
      window.removeEventListener('keyup', handleKeyUp);
    };
  }, [gameState]);

  const handleTouchStart = useCallback((e) => {
    if (gameState !== 'playing') {
      initAudio().then(() => {
        startMusic();
        playStartSound();
      });
      setGameState('playing');
      return;
    }
    e.preventDefault();
    const touch = e.touches[0];
    const canvas = canvasRef.current;
    if (!canvas) return;
    const rect = canvas.getBoundingClientRect();
    const x = (touch.clientX - rect.left) * (GAME_WIDTH / rect.width);
    gameRef.current.larryX = Math.max(0, Math.min(GAME_WIDTH - LARRY_WIDTH, x - LARRY_WIDTH / 2));
  }, [gameState]);

  const handleTouchMove = useCallback((e) => {
    if (gameState !== 'playing') return;
    e.preventDefault();
    const touch = e.touches[0];
    const canvas = canvasRef.current;
    if (!canvas) return;
    const rect = canvas.getBoundingClientRect();
    const x = (touch.clientX - rect.left) * (GAME_WIDTH / rect.width);
    gameRef.current.larryX = Math.max(0, Math.min(GAME_WIDTH - LARRY_WIDTH, x - LARRY_WIDTH / 2));
  }, [gameState]);

  useEffect(() => {
    if (gameState === 'menu') {
      const game = gameRef.current;
      if (!game.backgroundElements) {
        game.backgroundElements = createBackgroundElements();
      }
      
      let animId;
      const drawMenu = () => {
        const canvas = canvasRef.current;
        if (!canvas || gameState !== 'menu') return;
        const ctx = canvas.getContext('2d');
        const time = Date.now();
        
        const gradient = ctx.createLinearGradient(0, 0, 0, GAME_HEIGHT);
        gradient.addColorStop(0, '#4a8caf');
        gradient.addColorStop(1, '#0d1f33');
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT);
        
        drawBackgroundElements(ctx, game.backgroundElements, time);
        drawLarry(ctx, GAME_WIDTH/2 - 45, GAME_HEIGHT/2 + 40, 1.4);
        
        drawDonut(ctx, 80, 180, 50, Math.sin(time * 0.001) * 0.3);
        drawDonut(ctx, 350, 140, 45, Math.sin(time * 0.001 + 1) * 0.3);
        drawDonut(ctx, 200, 90, 40, Math.sin(time * 0.001 + 2) * 0.3);
        
        animId = requestAnimationFrame(drawMenu);
      };
      
      drawMenu();
      return () => cancelAnimationFrame(animId);
    }
  }, [gameState]);

  return (
    <div className="flex flex-col items-center justify-center min-h-screen bg-gradient-to-b from-slate-800 to-slate-900 p-4 select-none">
      <h1 
        className="text-2xl sm:text-3xl font-bold text-pink-400 mb-4 text-center"
        style={{ fontFamily: 'monospace', textShadow: '2px 2px 4px rgba(0,0,0,0.5)' }}
      >
        🐙 Larry The Octopus 🍩
      </h1>
      
      <div className="relative">
        <canvas
          ref={canvasRef}
          width={GAME_WIDTH}
          height={GAME_HEIGHT}
          className="border-4 border-pink-500 rounded-lg shadow-2xl"
          style={{ 
            maxWidth: '100%', 
            maxHeight: '70vh',
            touchAction: 'none',
            WebkitTouchCallout: 'none',
            WebkitUserSelect: 'none',
            userSelect: 'none',
          }}
          onTouchStart={handleTouchStart}
          onTouchMove={handleTouchMove}
        />

        {gameState === 'menu' && (
          <div className="absolute inset-0 bg-black/60 flex flex-col items-center justify-center rounded-lg backdrop-blur-sm">
            <h2 className="text-3xl text-white mb-2 font-bold">Larry The Octopus</h2>
            <p className="text-pink-300 mb-4 text-center px-6">
              Help Larry catch all the yummy donuts!
            </p>
            <p className="text-gray-400 text-sm mb-6 text-center px-4">
              ← → Arrow Keys, A/D, or Touch to move
            </p>
            <button
              onClick={() => {
                initAudio().then(() => {
                  startMusic();
                  playStartSound();
                });
                setGameState('playing');
              }}
              className="px-8 py-4 bg-pink-500 hover:bg-pink-400 active:bg-pink-600 text-white font-bold rounded-xl text-xl transition-all shadow-lg"
            >
              🎮 START GAME
            </button>
            <p className="text-gray-500 text-xs mt-4">Tap or press SPACE</p>
          </div>
        )}

        {gameState === 'gameover' && (
          <div className="absolute inset-0 bg-black/80 flex flex-col items-center justify-center rounded-lg">
            <div className="text-6xl mb-4">🐙💔</div>
            <h2 className="text-3xl text-red-400 mb-4 font-bold">Game Over!</h2>
            <p className="text-white text-2xl mb-2">Score: {score} 🍩</p>
            {score === highScore && score > 0 && (
              <p className="text-yellow-300 text-lg mb-2 animate-pulse">🎉 New High Score! 🎉</p>
            )}
            <p className="text-yellow-400 mb-6">Best: {highScore}</p>
            <button
              onClick={() => {
                initAudio().then(() => {
                  startMusic();
                  playStartSound();
                });
                setGameState('playing');
              }}
              className="px-8 py-4 bg-pink-500 hover:bg-pink-400 active:bg-pink-600 text-white font-bold rounded-xl text-xl transition-all shadow-lg"
            >
              🔄 PLAY AGAIN
            </button>
          </div>
        )}
      </div>

      <div className="mt-2 flex justify-center">
        <button
          onClick={() => {
            const newMuted = !muted;
            setMuted(newMuted);
            setMasterMute(newMuted);
          }}
          className="px-4 py-2 bg-slate-700 text-white rounded-lg hover:bg-slate-600 text-sm font-bold transition-colors"
        >
          {muted ? '🔇 Unmute' : '🔊 Mute'}
        </button>
      </div>

      <div className="mt-4 flex gap-4">
        <button
          className="px-8 py-4 bg-slate-700 text-white rounded-xl hover:bg-slate-600 active:bg-pink-600 text-lg font-bold select-none transition-colors touch-none"
          onMouseDown={() => gameRef.current.keys.left = true}
          onMouseUp={() => gameRef.current.keys.left = false}
          onMouseLeave={() => gameRef.current.keys.left = false}
          onTouchStart={(e) => { e.preventDefault(); gameRef.current.keys.left = true; }}
          onTouchEnd={(e) => { e.preventDefault(); gameRef.current.keys.left = false; }}
          onTouchCancel={(e) => { e.preventDefault(); gameRef.current.keys.left = false; }}
        >
          ⬅️ Left
        </button>
        <button
          className="px-8 py-4 bg-slate-700 text-white rounded-xl hover:bg-slate-600 active:bg-pink-600 text-lg font-bold select-none transition-colors touch-none"
          onMouseDown={() => gameRef.current.keys.right = true}
          onMouseUp={() => gameRef.current.keys.right = false}
          onMouseLeave={() => gameRef.current.keys.right = false}
          onTouchStart={(e) => { e.preventDefault(); gameRef.current.keys.right = true; }}
          onTouchEnd={(e) => { e.preventDefault(); gameRef.current.keys.right = false; }}
          onTouchCancel={(e) => { e.preventDefault(); gameRef.current.keys.right = false; }}
        >
          Right ➡️
        </button>
      </div>
    </div>
  );
}

// Render the app
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<LarryTheOctopus />);
  </script>
</body>
</html>
